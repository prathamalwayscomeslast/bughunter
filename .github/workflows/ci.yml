# ─────────────────────────────────────────────────────────────────────────────
# CI — runs on every push and pull request.
# Lints, type-checks, and runs tests for the orchestrator.
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: ["master", "dev"]
    paths:
      - "orchestrator/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["master"]
    paths:
      - "orchestrator/**"

jobs:
  lint-and-test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    defaults:
      run:
        working-directory: orchestrator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: orchestrator/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only the direct runtime deps we actually need
          # (not the full pip-freeze dump — see requirements.in for the source of truth)
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio httpx pydantic-settings

      - name: Lint (ruff)
        run: ruff check . --output-format=github

      - name: Type check (mypy)
        run: mypy . --ignore-missing-imports --exclude '(migrations|venv)'
        continue-on-error: true   # treat as warning until full type coverage exists

      - name: Run tests
        run: pytest tests/ -v
        env:
          # Minimal env so Pydantic Settings doesn't fail at import time.
          # Tests that need real external services should be marked @pytest.mark.integration
          # and skipped here.
          WEBHOOK_SECRET: test-secret
          GITHUB_APP_ID: "12345"
          GITHUB_PRIVATE_KEY_PATH: "/dev/null"
          DATABASE_URL: "postgresql://user:pass@localhost:5432/test"
          REDIS_URL: "redis://localhost:6379"
