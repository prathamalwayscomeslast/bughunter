# ─────────────────────────────────────────────────────────────────────────────
# Terraform Apply — provisions or updates the EC2 worker infrastructure.
# Runs ONLY on manual dispatch (workflow_dispatch) so you control when
# infrastructure changes happen.
# To tear down: use the same workflow but pass action=destroy.
# ─────────────────────────────────────────────────────────────────────────────
name: Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: "apply (provision/update) or destroy (tear down)"
        required: true
        default: apply
        type: choice
        options:
          - apply
          - destroy
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read

concurrency:
  group: terraform-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  terraform:
    name: Terraform ${{ inputs.action }} (${{ inputs.environment }})
    runs-on: ubuntu-latest

    environment: ${{ inputs.environment }}

    defaults:
      run:
        shell: bash
        working-directory: infra/terraform

    env:
      # Terraform reads TF_VAR_* automatically as variable values.
      TF_VAR_redis_url:              ${{ secrets.REDIS_URL }}
      TF_VAR_database_url:           ${{ secrets.DATABASE_URL }}
      TF_VAR_webhook_secret:         ${{ secrets.WEBHOOK_SECRET }}
      TF_VAR_github_app_id:          ${{ secrets.GHUB_APP_ID }}
      TF_VAR_github_private_key: ${{ secrets.GHUB_PRIVATE_KEY_B64 }}

      TF_VAR_ssh_public_key:         ${{ secrets.EC2_SSH_PUBLIC_KEY }}

      TF_VAR_environment:            ${{ inputs.environment }}
      TF_VAR_instance_type:          ${{ inputs.environment == 'prod' && 't3.small' || 't3.micro' }}

      TF_IN_AUTOMATION: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Cache Terraform Providers
        uses: actions/cache@v4
        with:
          path: |
            "~/.terraform.d/plugin-cache"
          key: terraform-${{ runner.os }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          if [ "${{ inputs.action }}" = "destroy" ]; then
            terraform plan -destroy -out=tfplan
          else
            terraform plan -out=tfplan
          fi

      - name: Show Plan Summary
        run: terraform show -no-color tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ inputs.environment }}
          path: infra/terraform/tfplan
          retention-days: 7

      - name: Terraform Apply / Destroy
        run: |
          if [ "${{ inputs.action }}" = "destroy" ]; then
            terraform destroy -auto-approve
          else
            terraform ${{ inputs.action }} -auto-approve tfplan
          fi

      - name: Terraform Outputs
        if: inputs.action == 'apply'
        run: terraform output

      - name: Output worker IP
        if: inputs.action == 'apply'
        run: |
          echo "Worker IP: "
          terraform output -raw worker_public_ip
